server {
    listen 80;
    server_name alif24.uz www.alif24.uz;

    # Certbot uchun
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTPS ga yo'naltirish
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name alif24.uz www.alif24.uz;

    # SSL Certificates (Certbot tomonidan yaratiladi)
    ssl_certificate /etc/letsencrypt/live/alif24.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alif24.uz/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Frontend - Static files
    location / {
        root /var/www/alif24-platform/frontend/dist;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Admin panel - alif24.uz/nurali
    location /nurali {
        root /var/www/alif24-platform/frontend/dist;
        try_files $uri $uri/ /index.html;
        
        # Robots'dan yashirish
        location = /nurali/robots.txt {
            return 200 "User-agent: *\nDisallow: /nurali/\n";
        }
    }

    # Avatars va media
    location /avatars {
        alias /var/www/alif24-platform/frontend/public/avatars;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Max upload size
    client_max_body_size 50M;
}
