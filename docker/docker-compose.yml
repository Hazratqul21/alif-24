# Alif24 Platform - Full Stack Docker Orchestration
version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: alif24-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alif24}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alif24-network

  # Backend API Service
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: alif24-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/alif24
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key_change_in_production_12345}
      - JWT_ALGORITHM=HS256
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_SPEECH_KEY=${AZURE_SPEECH_KEY}
      - AZURE_SPEECH_REGION=${AZURE_SPEECH_REGION}
      - ENVIRONMENT=development
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - alif24-network
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 5000 --reload"

  # Frontend Web Service
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: alif24-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api/v1
    depends_on:
      - backend
    networks:
      - alif24-network

networks:
  alif24-network:
    driver: bridge

volumes:
  postgres_data:


