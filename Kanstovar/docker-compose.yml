version: '3.8'

services:
  db:
    image: postgres:15
    container_name: marketplace-db
    environment:
      POSTGRES_USER: kanstovar
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kanstovardb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - alif24-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanstovar -d kanstovardb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: marketplace-backend
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=kanstovar
      - DB_PASS=password
      - DB_NAME=kanstovardb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - alif24-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  customer-app:
    build: ./customer-app
    container_name: marketplace-customer
    environment:
      - REACT_APP_API_URL=https://opt.alif24.uz
      - CHOKIDAR_USEPOLLING=true
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
      - HOST=0.0.0.0
      - WDS_SOCKET_PORT=0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alif24-network
    restart: unless-stopped

  seller-app:
    build: ./seller-app
    container_name: marketplace-seller
    environment:
      - REACT_APP_API_URL=https://seller.alif24.uz
      - CHOKIDAR_USEPOLLING=true
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
      - HOST=0.0.0.0
      - WDS_SOCKET_PORT=0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alif24-network
    restart: unless-stopped

networks:
  alif24-network:
    external: true
    name: alif-24_alif24-network

volumes:
  pgdata:
