user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    upstream backend_api {
        server marketplace-backend:4000;
    }

    upstream customer_app {
        server marketplace-customer:3000;
    }

    upstream seller_app {
        server marketplace-seller:3001;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name opt.alif24.uz seller.alif24.uz;
        return 301 https://$host$request_uri;
    }

    # Customer App Server (HTTPS)
    server {
        listen 443 ssl;
        server_name opt.alif24.uz;

        ssl_certificate /etc/letsencrypt/live/opt.alif24.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/opt.alif24.uz/privkey.pem;

        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://customer_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Seller App Server (HTTPS)
    server {
        listen 443 ssl;
        server_name seller.alif24.uz;

        ssl_certificate /etc/letsencrypt/live/opt.alif24.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/opt.alif24.uz/privkey.pem;

        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://seller_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
