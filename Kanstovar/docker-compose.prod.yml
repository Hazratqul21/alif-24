version: '3.8'

services:
  db:
    image: postgres:15
    container_name: marketplace-db
    environment:
      POSTGRES_USER: kanstovar
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kanstovardb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - marketplace-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanstovar -d kanstovardb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: marketplace-backend
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=kanstovar
      - DB_PASS=password
      - DB_NAME=kanstovardb
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - marketplace-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  customer-app:
    build: ./customer-app
    container_name: marketplace-customer
    environment:
      - REACT_APP_API_URL=/api
    ports:
      - "127.0.0.1:5182:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - marketplace-net
    restart: unless-stopped

  seller-app:
    build: ./seller-app
    container_name: marketplace-seller
    environment:
      - REACT_APP_API_URL=/api
    ports:
      - "127.0.0.1:5183:3001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - marketplace-net
    restart: unless-stopped

networks:
  marketplace-net:
    driver: bridge

volumes:
  pgdata:
