server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xml
        image/svg+xml;

    # Security & discovery headers (applied to HTML responses)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # =======================================================================
    # Hashed static assets: cache forever (Vite adds content hashes)
    # =======================================================================
    location ~* ^/assets/.*\.(js|mjs|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Image/media files: cache for a month
    location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg|mp3|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # =======================================================================
    # SEO files: short cache so Google re-fetches quickly after changes
    # =======================================================================
    location = /robots.txt {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }
    location = /sitemap.xml {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Type "application/xml; charset=utf-8" always;
        try_files $uri =404;
    }

    # =======================================================================
    # Private/authenticated SPA routes — served, but never indexed.
    # X-Robots-Tag forces removal from search results even if robots.txt was
    # loosened, or if crawlers discovered the URL before robots.txt took effect.
    # =======================================================================
    location ~ ^/(admin|hazratqul|nurali|pedagog|smartschool|student-dashboard|teacher-dashboard|parent-dashboard|organization-dashboard|profile|login|logout|livequiz|livequiz-teacher|market|dashboard)(/.*)?$ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # =======================================================================
    # Public routes — prefer the prerendered per-route HTML file.
    # dist/<route>/index.html is produced by scripts/prerender.mjs.
    # Fallback to SPA entrypoint so client-side navigation still works.
    # =======================================================================
    location / {
        # Light caching for HTML so Google re-crawls but browsers don't thrash
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri $uri/index.html $uri.html /index.html;
    }

    # =======================================================================
    # Custom 404: served with HTTP 404 status code (real, not soft-404).
    # scripts/prerender.mjs emits dist/404.html with <meta name="robots" noindex>.
    # =======================================================================
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}
