# Conditional X-Robots-Tag: noindex for private SPA routes, default = index,follow.
# Placed at http level via /etc/nginx/conf.d/ is not allowed, so we use a `map`
# in a dedicated snippet file (/etc/nginx/conf.d/robots-map.conf) and reference
# the resulting $robots_tag variable here.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xml
        image/svg+xml;

    # Security headers (applied to all responses)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # $robots_tag comes from /etc/nginx/conf.d/robots-map.conf and tells search
    # engines NOT to index admin/dashboard/auth URLs even if they previously
    # were crawled. Served on every response including SPA fallbacks to
    # /index.html (because the value is derived from $request_uri, not $uri).
    add_header X-Robots-Tag $robots_tag always;

    # =======================================================================
    # Hashed static assets: cache forever (Vite adds content hashes)
    # =======================================================================
    location ~* ^/assets/.*\.(js|mjs|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Image/media files: cache for a month
    location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg|mp3|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # =======================================================================
    # SEO files: short cache so Google re-fetches quickly after changes
    # =======================================================================
    location = /robots.txt {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }
    location = /sitemap.xml {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Type "application/xml; charset=utf-8" always;
        try_files $uri =404;
    }

    # =======================================================================
    # Known public or private SPA routes — serve prerendered file or SPA fallback.
    # =======================================================================
    # Explicit allow-list of valid React routes. Everything NOT matching falls
    # through to `location /` below which returns 404. This eliminates soft-404s.
    location ~ ^/(about|partners|privacy|leaderboard|smartkids|mathkids|market|dashboard|login|logout|profile|livequiz|livequiz-teacher|student-dashboard|teacher-dashboard|parent-dashboard|organization-dashboard|admin|hazratqul|nurali|pedagog|smartschool|harf|rharf|eharf|ai-search|olympiad|olympiads|reading|settings|payment|payments)(/.*)?$ {
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Robots-Tag $robots_tag always;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri $uri/index.html /index.html;
    }

    # =======================================================================
    # Root — serve prerendered index.html. If URL is not root and not a known
    # route, fall through to try_files which returns =404 → error_page /404.html.
    # =======================================================================
    location = / {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /index.html =404;
    }

    # =======================================================================
    # Unknown URL / static asset not found → real HTTP 404.
    # =======================================================================
    location / {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri $uri/index.html $uri.html =404;
    }

    # =======================================================================
    # Custom 404: served with HTTP 404 status (real, not soft-404).
    # scripts/prerender.mjs emits dist/404.html with <meta name="robots" noindex>.
    # =======================================================================
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}
