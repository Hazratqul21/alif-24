# Placed at http{} level (via /etc/nginx/conf.d/00-robots-map.conf so it loads
# before default.conf). Determines the X-Robots-Tag header based on the
# REQUESTED URI, so it stays correct even after internal try_files fallbacks
# rewrite $uri to /index.html.
map $request_uri $robots_tag {
    # Default: allow indexing
    default                                                             "index, follow, max-image-preview:large";

    # Private SPA areas: never index, never follow, never cache
    ~^/admin(/|$|\?)                                                    "noindex, nofollow, noarchive, nosnippet";
    ~^/hazratqul(/|$|\?)                                                "noindex, nofollow, noarchive, nosnippet";
    ~^/nurali(/|$|\?)                                                   "noindex, nofollow, noarchive, nosnippet";
    ~^/pedagog(/|$|\?)                                                  "noindex, nofollow, noarchive, nosnippet";
    ~^/smartschool(/|$|\?)                                              "noindex, nofollow, noarchive, nosnippet";
    ~^/student-dashboard(/|$|\?)                                        "noindex, nofollow, noarchive, nosnippet";
    ~^/teacher-dashboard(/|$|\?)                                        "noindex, nofollow, noarchive, nosnippet";
    ~^/parent-dashboard(/|$|\?)                                         "noindex, nofollow, noarchive, nosnippet";
    ~^/organization-dashboard(/|$|\?)                                   "noindex, nofollow, noarchive, nosnippet";
    ~^/dashboard(/|$|\?)                                                "noindex, nofollow, noarchive, nosnippet";
    ~^/profile(/|$|\?)                                                  "noindex, nofollow, noarchive, nosnippet";
    ~^/login(/|$|\?)                                                    "noindex, nofollow, noarchive, nosnippet";
    ~^/logout(/|$|\?)                                                   "noindex, nofollow, noarchive, nosnippet";
    ~^/livequiz(/|$|\?)                                                 "noindex, nofollow, noarchive, nosnippet";
    ~^/livequiz-teacher(/|$|\?)                                         "noindex, nofollow, noarchive, nosnippet";
    ~^/market(/|$|\?)                                                   "noindex, nofollow, noarchive, nosnippet";
    ~^/payment(/|$|\?)                                                  "noindex, nofollow, noarchive, nosnippet";
    ~^/settings(/|$|\?)                                                 "noindex, nofollow, noarchive, nosnippet";
    ~^/api(/|$|\?)                                                      "noindex, nofollow, noarchive, nosnippet";
    ~^/404(\.html)?$                                                    "noindex, nofollow";
}
