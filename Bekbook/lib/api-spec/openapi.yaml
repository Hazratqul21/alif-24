        email:
          type: string
        phone:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        address:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, seller, admin]
        category:
          type: string
          enum: [regular, student, teacher]
          description: Reader category
        isBlacklisted:
          type: string
