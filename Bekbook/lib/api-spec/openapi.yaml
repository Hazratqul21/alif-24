                type: integer
              title:
                type: string
              author:
                type: string
              isbn:
                type: string
              quantity:
                type: integer
              unitPrice:
                type: number
              reason:
                type: string
              inventoryNumbers:
                type: string
            required: [title, quantity]
      required: [type, number, date, items]

    BooksCatalogItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
        genre:
          type: string
        description:
          type: string
        isbn:
          type: string
        createdAt:
          type: string
      required: [id, title]

    BooksCatalogBody:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        genre:
          type: string
        description:
          type: string
        isbn:
          type: string
      required: [title]

    BooksCatalogResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BooksCatalogItem"
        total:
