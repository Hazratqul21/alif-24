        phone:
          type: string
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
      required:
        - name
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    User:
      type: object
