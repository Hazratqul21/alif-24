version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mahalla-postgres
    environment:
      POSTGRES_USER: mahalla
      POSTGRES_PASSWORD: mahalla123
      POSTGRES_DB: mahalla_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
